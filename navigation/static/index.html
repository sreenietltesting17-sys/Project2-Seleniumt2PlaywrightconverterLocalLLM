<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selenium ➾ Playwright Converter | B.L.A.S.T.</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Fira+Code&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="bubble bubble1"></div>
    <div class="bubble bubble2"></div>
    <div class="bubble bubble3"></div>

    <div class="container">
        <header>
            <h1>Selenium <span>➾</span> Playwright</h1>
            <p>Local LLM Test Code Converter</p>
        </header>

        <main>
            <div class="panel input-panel">
                <div class="panel-header">
                    <h2>Source Code <span class="badge">Selenium Java</span></h2>
                    <div class="controls">
                        <select id="targetLanguage" class="glass-select">
                            <option value="javascript">Convert to Javascript</option>
                            <option value="typescript">Convert to Typescript</option>
                        </select>
                    </div>
                </div>
                <textarea id="sourceCode" placeholder="// Paste your Selenium TestNG logic here..."></textarea>
                <div class="panel-footer">
                    <button id="convertBtn" class="btn-primary">
                        <span class="btn-text">Generate Playwright Code</span>
                        <div class="loader hidden"></div>
                    </button>
                </div>
            </div>

            <div class="panel output-panel">
                <div class="panel-header">
                    <h2>Output <span class="badge" id="outputBadge">Playwright</span></h2>
                    <div class="controls">
                        <button id="copyBtn" class="btn-icon" title="Copy to clipboard">📋</button>
                    </div>
                </div>
                <textarea id="targetCode" readonly placeholder="// Converted layout will appear here..."></textarea>
                <div class="panel-footer status-bar" id="statusBar">
                    <span class="status-icon">✅</span>
                    <span class="status-text">Ready to convert.</span>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
